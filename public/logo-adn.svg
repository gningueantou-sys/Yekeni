<svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="adnGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D5016;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6B8E23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6F47;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="treeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#228B22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B4513;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- DNA Double Helix (Bottom half) -->
  <!-- Left strand -->
  <path d="M 80 100 Q 70 120 80 140 Q 90 160 80 180" 
        stroke="url(#adnGradient)" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Right strand -->
  <path d="M 120 100 Q 130 120 120 140 Q 110 160 120 180" 
        stroke="url(#adnGradient)" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- DNA connecting bridges -->
  <g stroke="url(#adnGradient)" stroke-width="2" fill="none">
    <line x1="80" y1="110" x2="120" y2="110"/>
    <line x1="75" y1="130" x2="125" y2="130"/>
    <line x1="85" y1="150" x2="115" y2="150"/>
    <line x1="80" y1="170" x2="120" y2="170"/>
  </g>

  <!-- DNA base pair nodes -->
  <g fill="#6B8E23" opacity="0.7">
    <circle cx="80" cy="110" r="3"/>
    <circle cx="120" cy="110" r="3"/>
    <circle cx="75" cy="130" r="3"/>
    <circle cx="125" cy="130" r="3"/>
    <circle cx="85" cy="150" r="3"/>
    <circle cx="115" cy="150" r="3"/>
    <circle cx="80" cy="170" r="3"/>
    <circle cx="120" cy="170" r="3"/>
  </g>

  <!-- Transition zone (DNA transforming into tree) -->
  <path d="M 100 85 Q 85 75 75 65" 
        stroke="url(#treeGradient)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 100 85 Q 115 75 125 65" 
        stroke="url(#treeGradient)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- Tree trunk (Top half) -->
  <path d="M 100 85 L 95 50 Q 90 30 95 20" 
        stroke="url(#treeGradient)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 100 85 L 105 50 Q 110 30 105 20" 
        stroke="url(#treeGradient)" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Main trunk -->
  <rect x="95" y="50" width="10" height="35" fill="url(#treeGradient)" opacity="0.8" rx="2"/>

  <!-- Tree branches -->
  <g stroke="url(#treeGradient)" stroke-width="2.5" fill="none" stroke-linecap="round">
    <!-- Left branches -->
    <path d="M 95 60 Q 75 50 65 35"/>
    <path d="M 95 65 Q 70 55 55 40"/>
    <path d="M 95 70 Q 80 65 70 50"/>
    
    <!-- Right branches -->
    <path d="M 105 60 Q 125 50 135 35"/>
    <path d="M 105 65 Q 130 55 145 40"/>
    <path d="M 105 70 Q 120 65 130 50"/>
  </g>

  <!-- Leaves -->
  <g fill="#228B22" opacity="0.8">
    <!-- Left side leaves -->
    <ellipse cx="60" cy="30" rx="4" ry="6" transform="rotate(-30 60 30)"/>
    <ellipse cx="50" cy="35" rx="4" ry="6" transform="rotate(-45 50 35)"/>
    <ellipse cx="65" cy="50" rx="4" ry="6" transform="rotate(-20 65 50)"/>
    <ellipse cx="75" cy="65" rx="4" ry="6" transform="rotate(10 75 65)"/>
    
    <!-- Right side leaves -->
    <ellipse cx="140" cy="30" rx="4" ry="6" transform="rotate(30 140 30)"/>
    <ellipse cx="150" cy="35" rx="4" ry="6" transform="rotate(45 150 35)"/>
    <ellipse cx="135" cy="50" rx="4" ry="6" transform="rotate(20 135 50)"/>
    <ellipse cx="125" cy="65" rx="4" ry="6" transform="rotate(-10 125 65)"/>
  </g>

  <!-- Central leaf at top -->
  <ellipse cx="100" cy="15" rx="4" ry="6" fill="#228B22" opacity="0.9"/>

  <!-- DNA to Tree connector glow effect -->
  <circle cx="100" cy="85" r="8" fill="none" stroke="#6B8E23" stroke-width="1" opacity="0.5"/>
  <circle cx="100" cy="85" r="12" fill="none" stroke="#6B8E23" stroke-width="0.5" opacity="0.3"/>

  <!-- Bottom decorative roots from DNA -->
  <g stroke="#8B6F47" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round">
    <path d="M 75 180 Q 65 200 60 220"/>
    <path d="M 100 185 Q 100 210 100 230"/>
    <path d="M 125 180 Q 135 200 140 220"/>
  </g>
</svg>